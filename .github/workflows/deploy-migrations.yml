name: Deploy DB Migrations

on:
  push:
    branches: [master]
    paths:
      - 'pb_migrations/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hostedg
    steps:
      - uses: actions/checkout@v4

      - name: Copy migrations to server
        run: cp -r pb_migrations/. /mnt/user/appdata/pocketbase/pb_migrations/

      - name: Restart PocketBase container
        run: docker restart pocketbase
